name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  profile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: wpa2-smoltcp
            features: wpa2-personal,smoltcp
          - profile: wpa3-smoltcp
            features: wpa3-personal,smoltcp
          - profile: wpa2-incremental
            features: wpa2-personal,incremental-backend-experiment
          - profile: wpa3-incremental
            features: wpa3-personal,incremental-backend-experiment
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: clippy,rust-src,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test --locked --lib --features ${{ matrix.features }}
      - run: cargo check --locked --lib --features ${{ matrix.features }}
      - run: cargo clippy --locked --lib --features ${{ matrix.features }} -- -D warnings
      - run: cargo check -Zbuild-std=core,alloc --locked --target riscv32imfc-unknown-none-elf --lib --features ${{ matrix.features }}
      - name: Emit the versioned profile resource report
        run: cargo run --locked --example resource_report --features ${{ matrix.features }} > resource-report.json
      - name: Show the profile resource report
        run: cat resource-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: resource-report-${{ matrix.profile }}
          path: resource-report.json
          if-no-files-found: error

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
      - name: Verify the committed standalone lockfile
        run: |
          git ls-files --error-unmatch Cargo.lock
          cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - run: cargo package --locked

  minimal-target:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: rust-src
      - name: Check the feature-minimal WS63 target graph
        run: cargo check -Zbuild-std=core,alloc --locked --target riscv32imfc-unknown-none-elf --lib

  final-link:
    name: Final RF link (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_RISCV32IMFC_UNKNOWN_NONE_ELF_RUSTFLAGS: -C link-arg=-Thisi-riscv-link.x -C link-arg=--no-relax
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: rust-src
      - name: Link a complete upstream-WPA2 firmware with stock rust-lld
        run: cargo build -Zbuild-std=core --locked --release --target riscv32imfc-unknown-none-elf --example plain_firmware --features wpa2-personal,smoltcp
      - name: Link the no-AP bootstrap profiler with stock rust-lld
        run: cargo build -Zbuild-std=core --locked --release --target riscv32imfc-unknown-none-elf --example bootstrap_profile --features wpa2-personal,incremental-backend-experiment
