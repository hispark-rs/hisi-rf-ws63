name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  profile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - wpa2-personal,smoltcp
          - wpa3-personal,smoltcp
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: clippy,rust-src,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test --locked --lib
      - run: cargo check --locked --lib --features ${{ matrix.features }}
      - run: cargo clippy --locked --lib --features ${{ matrix.features }} -- -D warnings
      - run: cargo check -Zbuild-std=core,alloc --locked --target riscv32imfc-unknown-none-elf --lib --features ${{ matrix.features }}

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
      - run: cargo generate-lockfile --locked
      - run: cargo package --locked

  minimal-target:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: rust-src
      - name: Check the feature-minimal WS63 target graph
        run: cargo check -Zbuild-std=core,alloc --locked --target riscv32imfc-unknown-none-elf --lib
